    return (aC==="all"||e.c===aC)&&(aM==="all"||parseInt(e.d.split("-")[1])===aM)&&(!q||e.n.toLowerCase().indexOf(q)>=0);
  });
}

function render(){
  var evs=gf();
  var box=document.getElementById("content");
  var nr=document.getElementById("nores");
  if(!evs.length){box.innerHTML="";nr.style.display="block";stats([]);return;}
  nr.style.display="none";
  var bm={};
  evs.forEach(function(e){var m=parseInt(e.d.split("-")[1]);if(!bm[m])bm[m]=[];bm[m].push(e);});
  var mk=false, html="";
  Object.keys(bm).sort(function(a,b){return a-b;}).forEach(function(m){
    var list=bm[m];
    html+='<div class="mgroup"><div class="mlabel">📅 '+MN[parseInt(m)]+' 2026 <span class="mc">'+list.length+'</span></div>';
    list.forEach(function(e){
      var v=du(e.d), d=new Date(e.d), col=COL[e.c], lead=e.p===3?14:(e.p===2?10:7);
      var op=v<0?"opacity:.55;":"";
      if(!mk&&v>=0){
        var td=t0();
        html+='<div class="today-line" id="today-marker">📍 Hari Ini: '+td.getDate()+' '+MN[td.getMonth()+1]+' 2026</div>';
        mk=true;
      }
      html+='<div class="titem" style="'+op+'">';
      html+='<div class="dcol"><div class="dn">'+String(d.getDate()).padStart(2,"0")+'</div><div class="dw">'+DY[d.getDay()]+'</div></div>';
      html+='<div class="lcol"><div class="dot" style="background:'+col+';box-shadow:0 0 0 2px '+col+'"></div><div class="vl"></div></div>';
      html+='<div class="card" style="border-left-color:'+col+'">';
      html+='<div class="ctop"><div class="ctitle">'+e.i+' '+e.n+'</div><span class="badge" style="background:'+col+'">'+CL[e.c]+'</span></div>';
      html+='<div class="cmeta">'+chip(v)+'</div>';
      if(e.t) html+='<div class="pnote"><span>💡</span><span>'+e.t+'</span></div>';
      if(v>=0&&v>7) html+=dnote(v,lead);
      html+='</div></div>';
    });
    html+='</div>';
  });
  box.innerHTML=html;
  stats(evs);
}

function stats(evs){
  var up=evs.filter(function(e){return du(e.d)>=0;}).length;
  var past=evs.filter(function(e){return du(e.d)<0;}).length;
  var urg=evs.filter(function(e){var v=du(e.d);return v>=0&&v<=14;}).length;
  var hi=evs.filter(function(e){return e.p===3&&du(e.d)>=0;}).length;
  document.getElementById("statsBar").innerHTML=
    '<div class="spill"><div class="sdot" style="background:#22bb33"></div>'+up+' mendatang</div>'+
    '<div class="spill"><div class="sdot" style="background:#cc0000"></div>'+urg+' perlu tindakan</div>'+
    '<div class="spill"><div class="sdot" style="background:#e8a020"></div>'+hi+' prioritas tinggi</div>'+
    '<div class="spill"><div class="sdot" style="background:#aaa"></div>'+past+' sudah berlalu</div>';
  document.getElementById("summaryBox").innerHTML=
    '<div class="si"><div class="n">'+evs.length+'</div><div class="l">Total</div></div>'+
    '<div class="si"><div class="n">'+up+'</div><div class="l">Mendatang</div></div>'+
    '<div class="si"><div class="n">'+urg+'</div><div class="l">Segera Dibuat</div></div>'+
    '<div class="si"><div class="n">'+hi+'</div><div class="l">Prioritas Tinggi</div></div>';
}

function setC(cat,btn){
  aC=cat;
  document.querySelectorAll("#catF .fbtn").forEach(function(b){b.style.background="white";b.style.color="#5a6a7e";b.style.borderColor="#c8d6e8";});
  btn.style.background=cat==="all"?"#1a3a6b":COL[cat];btn.style.color="white";btn.style.borderColor="transparent";
  render();
}
function setM(mon,btn){
  aM=mon;
  document.querySelectorAll("#monF .fbtn").forEach(function(b){b.style.background="white";b.style.color="#5a6a7e";b.style.borderColor="#c8d6e8";});
  btn.style.background="#1a3a6b";btn.style.color="white";btn.style.borderColor="transparent";
  render();
}

function buildFilters(){
  var cats=[["all","Semua"],["pendidikan","🎓 Pendidikan"],["psikologi","🧠 Psikologi"],["nasional","🇮🇩 Nasional"],["sosial","🌸 Sosial"],["agama","🕌 Keagamaan"],["kesehatan","🏥 Kesehatan"]];
  var h="";
  cats.forEach(function(c,i){
    var s=i===0?'style="background:#1a3a6b;color:white;border-color:transparent"':'';
    h+='<button class="fbtn" '+s+' id="cb_'+c[0]+'">'+c[1]+'</button>';
  });
  document.getElementById("catF").innerHTML=h;
  cats.forEach(function(c){
    document.getElementById("cb_"+c[0]).addEventListener("click",function(){setC(c[0],this);});
  });

  var used=[];
  EV.forEach(function(e){var m=parseInt(e.d.split("-")[1]);if(used.indexOf(m)<0)used.push(m);});
  used.sort(function(a,b){return a-b;});
  var h2='<button class="fbtn" style="background:#1a3a6b;color:white;border-color:transparent" id="mb_all">All</button>';
  used.forEach(function(m){h2+='<button class="fbtn" id="mb_'+m+'">'+MN[m].substring(0,3)+'</button>';});
  document.getElementById("monF").innerHTML=h2;
  document.getElementById("mb_all").addEventListener("click",function(){setM("all",this);});
  used.forEach(function(m){document.getElementById("mb_"+m).addEventListener("click",function(){setM(m,this);});});
}

document.getElementById("searchInput").addEventListener("input",render);
document.getElementById("todayBtn").addEventListener("click",function(){
  var el=document.getElementById("today-marker");
  if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
});

buildFilters();
render();
</script>
</body>
</html>
