function getVideoId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]{11})/);
  return m ? m[1] : null;
}
function getPlaylistId(url) {
  if (!url) return null;
  const m = url.match(/[?&]list=([^#&?]+)/);
  return m ? m[1] : null;
}

}

  if (timeEl) timeEl.textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  if (dateEl) dateEl.textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function renderAnnSlide() {
  const container = document.getElementById('ann-content');
  const dotsEl    = document.getElementById('ann-dots');
  if (!container || !dotsEl) return;
  const anns = appData.announcements;
  if (!anns.length) { container.innerHTML = `<div class="text-emerald-500 text-center py-8 text-sm">Tidak ada pengumuman.</div>`; return; }
  currentAnnSlide = currentAnnSlide % anns.length;
  const ann = anns[currentAnnSlide];
  container.innerHTML = `
    <div class="w-full flex flex-col items-center text-center animate-fade-in">
      <div class="text-emerald-800 text-sm font-bold mb-4 bg-emerald-100 px-4 py-1.5 rounded-full border border-emerald-200">${ann.date}</div>
      <p class="text-emerald-950 text-xl leading-relaxed font-medium">${ann.text}</p>
    </div>`;
  dotsEl.innerHTML = anns.map((_, i) =>
    `<div class="h-2 rounded-full transition-all duration-300 ${i === currentAnnSlide ? 'w-6 bg-amber-500' : 'w-2 bg-emerald-200'}"></div>`
  ).join('');
}

const medalColors = ['text-yellow-700 bg-yellow-100 border-yellow-400','text-slate-600 bg-slate-100 border-slate-400','text-amber-700 bg-amber-100 border-amber-500'];
const glowColors  = ['bg-yellow-400','bg-slate-300','bg-amber-600'];
const borderColors= ['border-yellow-400','border-slate-300','border-amber-500'];
const scoreColors = ['text-yellow-600','text-slate-500','text-amber-600'];
const rankLabels  = ['JUARA 1','JUARA 2','JUARA 3'];

function renderEmpSlide() {
  const container = document.getElementById('emp-content');
  const dotsEl    = document.getElementById('emp-dots');
  if (!container || !dotsEl) return;
  const sorted = [...appData.employees].sort((a,b) => b.score - a.score).slice(0,3);
  if (!sorted.length) return;
  currentEmpSlide = currentEmpSlide % sorted.length;
  const emp = sorted[currentEmpSlide];
  const i = currentEmpSlide;
  container.innerHTML = `
    <div class="flex flex-col items-center w-full animate-fade-in h-full justify-center relative">
      <div class="absolute top-4 left-4 px-4 py-1.5 rounded-xl font-black text-sm border-2 shadow-lg ${medalColors[i]}">${rankLabels[i]}</div>
      <div class="relative mb-4 mt-2">
        <div class="absolute inset-0 rounded-full blur-md opacity-40 ${glowColors[i]}"></div>
        <img src="${emp.photo}" alt="${emp.name}" class="w-28 h-28 rounded-full object-cover border-4 relative z-10 ${borderColors[i]}" onerror="this.src='https://via.placeholder.com/150'" />
      </div>
      <h4 class="text-emerald-950 font-bold text-lg text-center mb-1 max-w-[90%] truncate">${emp.name}</h4>
      <p class="text-emerald-700 font-medium text-sm text-center mb-4 max-w-[90%] truncate">${emp.role}</p>
      <div class="flex flex-col items-center bg-emerald-50 px-6 py-2 rounded-2xl border border-emerald-100 shadow-inner">
        <span class="text-[10px] text-emerald-600 uppercase tracking-widest mb-0.5 font-bold">Skor Kinerja</span>
        <span class="text-2xl font-black ${scoreColors[i]}">${emp.score}</span>
      </div>
    </div>`;
  dotsEl.innerHTML = [0,1,2].map(idx =>
    `<div class="h-2 rounded-full transition-all duration-300 ${idx === i ? 'w-6 bg-amber-500' : 'w-2 bg-emerald-200'}"></div>`
  ).join('');
}

    content.innerHTML = `

  } else if (activeTab === 'announcements') {
    const rows = appData.announcements.map((ann, idx) => `

        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Item #${idx+1}</span>
          <button onclick="deleteAnnouncement(${ann.id})" class="text-red-500 hover:text-red-600 p-1 hover:bg-red-50 rounded">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

        <div class="grid grid-cols-4 gap-3">
          <div class="col-span-1">
            <label class="block text-xs font-medium text-emerald-800 mb-1">Tanggal</label>

          </div>
          <div class="col-span-3">
            <label class="block text-xs font-medium text-emerald-800 mb-1">Isi Pengumuman</label>
            <input type="text" value="${ann.text}" onchange="updateAnn(${ann.id},'text',this.value)"
              class="w-full bg-white border border-emerald-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
          </div>
        </div>
      </div>`).join('');
    content.innerHTML = `
      <div class="flex justify-between items-center border-b border-emerald-100 pb-2 mb-4">
        <h3 class="text-lg font-bold text-emerald-900">Daftar Pengumuman</h3>
        <button onclick="addAnnouncement()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg">+ Tambah</button>
      </div>
      <div class="space-y-4">${rows}</div>`;
  } else if (activeTab === 'employees') {
    const rows = appData.employees.map((emp) => `
      <div class="bg-emerald-50/50 p-5 rounded-xl border border-emerald-100 flex flex-col md:flex-row gap-5">
        <div class="flex flex-col items-center gap-2">
          <img id="prev-${emp.id}" src="${emp.photo}" class="w-24 h-24 rounded-lg object-cover border-2 border-emerald-200" onerror="this.src='https://via.placeholder.com/150'" />
        </div>
        <div class="flex-1 grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-emerald-800 mb-1">Nama Lengkap & Gelar</label>
            <input type="text" value="${emp.name}" onchange="updateEmp(${emp.id},'name',this.value)"
              class="w-full bg-white border border-emerald-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-emerald-800 mb-1">Jabatan / Prodi</label>
            <input type="text" value="${emp.role}" onchange="updateEmp(${emp.id},'role',this.value)"
              class="w-full bg-white border border-emerald-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-emerald-800 mb-1">URL Foto</label>
            <input type="text" value="${emp.photo}" oninput="updateEmp(${emp.id},'photo',this.value);document.getElementById('prev-${emp.id}').src=this.value"

          </div>
          <div>
            <label class="block text-xs font-medium text-emerald-800 mb-1">Skor Kinerja (Max 100)</label>
            <input type="number" step="0.1" value="${emp.score}" onchange="updateEmp(${emp.id},'score',parseFloat(this.value)||0)"
              class="w-full bg-white border border-emerald-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
          </div>
        </div>
      </div>`).join('');
    content.innerHTML = `
      <div class="border-b border-emerald-100 pb-2 mb-4">
        <h3 class="text-lg font-bold text-emerald-900">Top 3 Pegawai Berprestasi</h3>
        <p class="text-xs text-emerald-600">Sistem otomatis mengurutkan berdasarkan skor tertinggi.</p>
      </div>

function applyVideoUrl() {
  const val = document.getElementById('input-video-url').value.trim();
  if (val) { appData.videoUrl = val; initYTPlayer(); }
}
function updateAnn(id, field, val) {
  const ann = appData.announcements.find(a => a.id === id);
  if (ann) ann[field] = val;
}
function deleteAnnouncement(id) {
  appData.announcements = appData.announcements.filter(a => a.id !== id);
  renderAdminContent(); renderAnnSlide();
}
function addAnnouncement() {
  appData.announcements.push({ id: Date.now(), text: "Pengumuman baru...", date: new Date().toLocaleDateString('id-ID') });
  renderAdminContent(); renderAnnSlide();
}
function updateEmp(id, field, val) {
  const emp = appData.employees.find(e => e.id === id);
  if (emp) emp[field] = val;
}
function setAdminTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.admin-tab-btn').forEach(btn => {
    const isActive = btn.dataset.tab === tab;
    btn.className = `admin-tab-btn flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors border-l-4 w-full text-left ${isActive ? 'border-emerald-600 bg-emerald-100 text-emerald-800 font-bold' : 'border-transparent text-emerald-700 hover:text-emerald-900 hover:bg-emerald-100/50'}`;
  });
  renderAdminContent();
}
function saveAdmin() {
  const rt = document.getElementById('input-running-text');
  if (rt) { appData.runningText = rt.value; refreshRunningText(); }
  closeAdmin();
  renderAnnSlide(); renderEmpSlide();
}
function refreshRunningText() {
  const el = document.getElementById('running-text-content');
  if (el) el.textContent = `${appData.runningText} • ${appData.runningText} • ${appData.runningText}`;
}
function openPasswordPrompt() {
  document.getElementById('password-modal').classList.remove('hidden');
  document.getElementById('password-input').value = '';
  document.getElementById('password-error').classList.add('hidden');
  setTimeout(() => document.getElementById('password-input').focus(), 100);
}
function closePasswordPrompt() { document.getElementById('password-modal').classList.add('hidden'); }
function submitPassword(e) {
  e.preventDefault();
  if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
    closePasswordPrompt();
    document.getElementById('admin-modal').classList.remove('hidden');
    renderAdminContent();
  } else {
    document.getElementById('password-error').classList.remove('hidden');
  }
}
function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
